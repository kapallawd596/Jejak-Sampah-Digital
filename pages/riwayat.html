<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - Jejak Sampah Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --bg-gradient: linear-gradient(135deg, #d4f5e9 0%, #a3e4d7 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 135, 85, 0.15);
            --text-dark: #1a5e3a;
            --text-light: #2d6a4f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-x: hidden;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 1rem 2rem;
            border-bottom: 1px solid rgba(46, 204, 113, 0.3);
            margin-bottom: 2rem;
        }

        .logo-area i {
            font-size: 2rem;
            color: var(--dark-green);
        }

        .logo-area h2 {
            font-weight: 600;
            font-size: 1.3rem;
            color: var(--text-dark);
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.5);
            color: var(--dark-green);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: white;
            color: var(--dark-green);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
            font-weight: 600;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: fadeInUp 0.4s ease-out;
        }

        .glass-card:hover {
            box-shadow: 0 12px 40px 0 rgba(31, 135, 85, 0.2);
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: var(--primary-green);
            font-size: 1.8rem;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* Stats Summary */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
        }

        .stat-item i {
            font-size: 2rem;
            color: var(--primary-green);
        }

        .stat-item h4 {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .stat-item span {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            gap: 1rem;
        }

        .glass-select {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            color: var(--text-dark);
            font-weight: 500;
            outline: none;
            cursor: pointer;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: var(--text-dark);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background: white;
        }

        .btn-danger {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: #e74c3c;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        /* History Table */
        .history-table-container {
            padding: 0;
            overflow: hidden;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: left;
            padding: 1.25rem 1.5rem;
            background: rgba(46, 204, 113, 0.1);
            color: var(--text-dark);
            font-weight: 600;
            border-bottom: 2px solid rgba(46, 204, 113, 0.2);
        }

        .history-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-light);
        }

        .history-table tbody tr {
            transition: background 0.2s;
        }

        .history-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .category-eco { background: rgba(46, 204, 113, 0.2); color: #1a5e3a; }
        .category-normal { background: rgba(241, 196, 15, 0.15); color: #7d6608; }
        .category-boros { background: rgba(231, 76, 60, 0.1); color: #c0392b; }

        .trend-down { color: #27ae60; }
        .trend-up { color: #e74c3c; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--primary-green);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
            }

            .nav-menu {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-item {
                padding: 0.6rem 1rem;
            }

            .main-content {
                padding: 1rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .stats-summary {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .filter-group {
                width: 100%;
                flex-direction: column;
            }

            .history-table th,
            .history-table td {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebarContainer"></div>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-history"></i> Riwayat Aktivitas</h1>
                <p class="page-subtitle">Jejak kalkulasi dan perkembangan jejak digitalmu</p>
            </div>

            <!-- Stats Summary -->
            <div class="stats-summary">
                <div class="stat-item glass-card">
                    <i class="fas fa-calculator"></i>
                    <div>
                        <h4>Total Kalkulasi</h4>
                        <span id="totalCalc">0 kali</span>
                    </div>
                </div>
                <div class="stat-item glass-card">
                    <i class="fas fa-calendar-check"></i>
                    <div>
                        <h4>Kalkulasi Terakhir</h4>
                        <span id="lastCalcDate">-</span>
                    </div>
                </div>
                <div class="stat-item glass-card">
                    <i class="fas fa-chart-line"></i>
                    <div>
                        <h4>Rata-rata CO₂</h4>
                        <span id="avgCO2">0 kg</span>
                    </div>
                </div>
            </div>

            <!-- Filter & Actions -->
            <div class="filter-bar glass-card">
                <div class="filter-group">
                    <select id="filterPeriod" class="glass-select">
                        <option value="all">Semua Waktu</option>
                        <option value="week">7 Hari Terakhir</option>
                        <option value="month">30 Hari Terakhir</option>
                    </select>
                    <select id="filterCategory" class="glass-select">
                        <option value="all">Semua Kategori</option>
                        <option value="Eco Friendly">🌿 Eco Friendly</option>
                        <option value="Normal">🌱 Normal</option>
                        <option value="Boros Digital">⚠️ Boros Digital</option>
                    </select>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                  
                    <button class="btn-danger" onclick="clearHistory()">
                        <i class="fas fa-trash-alt"></i> Hapus Riwayat
                    </button>
                </div>
            </div>

            <!-- History Table -->
            <div class="glass-card history-table-container">
                <div style="overflow-x: auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Tanggal & Waktu</th>
                                <th>CO₂ (kg)</th>
                                <th>Energi (kWh)</th>
                                <th>Skor</th>
                                <th>Kategori</th>
                                <th>Tren</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Diisi oleh JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // AUTH GUARD & SIDEBAR
        // ============================================
        (function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '../index.html';
            }

            window.logout = function() {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                window.location.href = '../index.html';
            };

            const sidebar = document.getElementById('sidebarContainer');
            const currentPage = window.location.pathname.split('/').pop() || 'riwayat.html';

            sidebar.innerHTML = `
                <div class="logo-area">
                    <i class="fas fa-recycle"></i>
                    <h2>EcoDigital</h2>
                </div>
                <div class="nav-menu">
                    <a href="beranda.html" class="nav-item ${currentPage === 'beranda.html' ? 'active' : ''}">
                        <i class="fas fa-home"></i> Beranda
                    </a>
                    <a href="kalkulator.html" class="nav-item ${currentPage === 'kalkulator.html' ? 'active' : ''}">
                        <i class="fas fa-calculator"></i> Kalkulator
                    </a>
                    <a href="dashboard.html" class="nav-item ${currentPage === 'dashboard.html' ? 'active' : ''}">
                        <i class="fas fa-chart-pie"></i> Dashboard
                    </a>
                    <a href="tips.html" class="nav-item ${currentPage === 'tips.html' ? 'active' : ''}">
                        <i class="fas fa-lightbulb"></i> Tips
                    </a>
                    <a href="riwayat.html" class="nav-item ${currentPage === 'riwayat.html' ? 'active' : ''}">
                        <i class="fas fa-history"></i> Riwayat
                    </a>
                </div>
               
            `;
        })();

        // ============================================
        // RIWAYAT LOGIC
        // ============================================
        let allHistory = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            setupFilters();
        });

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('calcHistory') || '[]');
            allHistory = history;
            
            // Update stats
            document.getElementById('totalCalc').textContent = history.length + ' kali';
            
            if (history.length > 0) {
                const last = history[history.length - 1];
                const dateParts = last.date.split(',')[0];
                document.getElementById('lastCalcDate').textContent = dateParts;
                
                const avgCO2 = history.reduce((sum, h) => sum + h.co2, 0) / history.length;
                document.getElementById('avgCO2').textContent = avgCO2.toFixed(2) + ' kg';
            } else {
                document.getElementById('lastCalcDate').textContent = '-';
                document.getElementById('avgCO2').textContent = '0 kg';
            }
            
            renderTable(history);
        }

        function renderTable(data) {
            const tbody = document.getElementById('historyTableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fas fa-history"></i>
                                <p>Belum ada data kalkulasi</p>
                                <p style="font-size: 0.9rem; margin-top: 0.5rem;">Gunakan kalkulator untuk mulai mencatat jejak digitalmu</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            // Urutkan dari terbaru ke lama
            const sortedData = [...data].reverse();
            
            let html = '';
            sortedData.forEach((item, index) => {
                // Tentukan kategori class
                let categoryClass = 'category-normal';
                if (item.category.includes('Eco')) categoryClass = 'category-eco';
                if (item.category.includes('Boros')) categoryClass = 'category-boros';
                
                // Format tanggal
                let dateStr = item.date || '-';
                
                // Hitung tren (dibanding data sebelumnya)
                let trendHtml = '-';
                const currentIndex = data.findIndex(d => d.date === item.date);
                if (currentIndex > 0) {
                    const prev = data[currentIndex - 1].co2;
                    const curr = item.co2;
                    const change = ((curr - prev) / prev) * 100;
                    
                    if (change < -5) {
                        trendHtml = `<span class="trend-down"><i class="fas fa-arrow-down"></i> ${Math.abs(change).toFixed(1)}%</span>`;
                    } else if (change > 5) {
                        trendHtml = `<span class="trend-up"><i class="fas fa-arrow-up"></i> ${change.toFixed(1)}%</span>`;
                    } else {
                        trendHtml = `<span style="color: #f39c12;"><i class="fas fa-minus"></i> 0%</span>`;
                    }
                }
                
                html += `
                    <tr>
                        <td>${sortedData.length - index}</td>
                        <td>${dateStr}</td>
                        <td>${item.co2.toFixed(2)} kg</td>
                        <td>${item.energy.toFixed(2)} kWh</td>
                        <td><strong>${item.score}</strong></td>
                        <td><span class="category-badge ${categoryClass}">${item.category || 'Normal'}</span></td>
                        <td>${trendHtml}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        function setupFilters() {
            const periodFilter = document.getElementById('filterPeriod');
            const categoryFilter = document.getElementById('filterCategory');
            
            function applyFilters() {
                let filtered = [...allHistory];
                
                // Filter periode
                const period = periodFilter.value;
                if (period !== 'all') {
                    const now = new Date();
                    const days = period === 'week' ? 7 : 30;
                    const cutoff = new Date(now.setDate(now.getDate() - days));
                    
                    filtered = filtered.filter(item => {
                        const itemDate = new Date(item.date.split(',')[0].split('/').reverse().join('-'));
                        return itemDate >= cutoff;
                    });
                }
                
                // Filter kategori
                const category = categoryFilter.value;
                if (category !== 'all') {
                    filtered = filtered.filter(item => item.category.includes(category.replace('🌿 ', '').replace('🌱 ', '').replace('⚠️ ', '')));
                }
                
                renderTable(filtered);
            }
            
            periodFilter.addEventListener('change', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
        }

        window.exportHistory = function() {
            const history = localStorage.getItem('calcHistory') || '[]';
            const blob = new Blob([history], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `riwayat-jejak-digital-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.clearHistory = function() {
            if (confirm('Apakah Anda yakin ingin menghapus semua riwayat kalkulasi?')) {
                localStorage.setItem('calcHistory', '[]');
                localStorage.removeItem('lastCalc');
                allHistory = [];
                loadHistory();
            }
        };
    </script>
</body>
</html>
